<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbacateFilmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">AbacateFilmes</div>
        <nav>
            <a href="index.html">Início</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <section class="hero" id="hero">
        <div class="hero-content">
            <h1 id="hero-title">VENOM: TEMPO DE CARNIFICINA</h1>
            <p id="hero-desc">Eddie Brock e Venom enfrentam o serial killer Cletus Kasady, que se torna o terrível Carnificina.</p>
            <button id="hero-btn" class="hero-btn">▶ Assistir trailer</button>
        </div>
        <div class="hero-dots" id="hero-dots"></div>
    </section>

    <section class="vitrine">
        <h2>🥑 Meus filmes favoritos</h2>
        <div class="cards-container" id="cards-container"></div>
    </section>

    <!-- MODAL --><!-- MODAL -->
    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <span class="close-btn" onclick="closeModal()">×</span>
            </div>
            <div class="modal-body">
                <img id="modal-poster" class="modal-poster" src="" alt="">
                <div style="flex:1">
                    <p id="modal-desc" style="font-size:1.18rem; line-height:1.8; color:#c5d6f0; margin-bottom:25px;"></p>
                    <button id="trailer-btn-modal" class="play-btn">▶ Assistir trailer agora</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        © 2026 AbacateFilmes • Feito com 🥑 e muito amor • Versão para o Mateus
    </footer>

    <script src="script.js"></script>
</body>
</html>
